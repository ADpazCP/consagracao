<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ADPAZ - Cadastro consagração</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#3273dc">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="logo-icon.png">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body { 
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); 
            min-height: 100vh; 
            padding: 40px 20px; 
            font-family: 'Segoe UI', sans-serif; 
        }
        .form-container { 
            max-width: 900px; 
            margin: auto; 
            background: white; 
            padding: 40px; 
            border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); 
        }
        .header-box { 
            border-bottom: 3px solid #3273dc; 
            margin-bottom: 30px; 
            padding-bottom: 20px; 
            text-align: center;
        }
        .label { 
            font-size: 0.85rem; 
            color: #4a4a4a; 
            font-weight: 700; 
            margin-bottom: 0.5em; 
        }
        .input, .select select { 
            border-radius: 8px !important; 
            border: 1.5px solid #eee; 
            transition: all 0.3s;
        }
        .input:focus, .select select:focus { border-color: #3273dc; box-shadow: 0 0 0 0.125em rgba(50, 115, 220, 0.1); }
        .force-uppercase { text-transform: uppercase; }
        .divider { height: 1px; background-color: #ebedef; margin: 25px 0; width: 100%; }
        .logo-adpaz { width: 124px; height: 94px; object-fit: contain; }
        .btn-enviar { height: 55px; font-weight: bold; font-size: 1.1rem; border-radius: 10px; }
        
        #coluna-conjuge { display: none; }
    </style>
</head>
<body>

<div class="form-container">
    <div class="header-box">
        <img src="adpaz.png" alt="Logo ADPAZ" class="logo-adpaz mt-2">
        <h1 class="title is-4 mt-3 force-uppercase">Cadastro de Indicação à Consagração</h1>
        <p class="subtitle is-6 has-text-grey">Assembleia de Deus - Ministério Internacional Paz & Vida</p>
    </div>

    <form id="cadastroForm">
        <input type="hidden" name="registro" id="campo_registro">
        <input type="hidden" name="nacionalidade2" value="">

        <div class="columns is-multiline">
            <div class="column is-8"> 
                <label class="label">Nome Completo</label>
                <div class="control has-icons-left">
                    <input class="input force-uppercase" type="text" name="candidato" placeholder="Digite o nome completo" required>
                    <span class="icon is-small is-left"><i class="fas fa-user"></i></span>
                </div>
            </div>
            </div>

        <div class="mt-6">
            <button type="submit" id="btnSalvar" class="button is-link is-fullwidth btn-enviar">
                <span class="icon"><i class="fas fa-paper-plane"></i></span>
                <span>FINALIZAR E ENVIAR CADASTRO</span>
            </button>
        </div>
    </form>
</div>

<script>
    // REGISTRO DO SERVICE WORKER (PARA INSTALAÇÃO)
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js')
                .then(reg => console.log('PWA: Ativo'))
                .catch(err => console.error('PWA: Erro', err));
        });
    }

    // O RESTO DO SEU SCRIPT ORIGINAL CONTINUA ABAIXO...
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx9BkrkkpysXbKKWXS6wR_JknEdeYvIxO_gtAkOMebddMpDtzLPmTBdPqom7SnmahLE/exec";

    // ... lógica de máscara, validação e envio (IGUAL AO SEU ORIGINAL) ...
</script>

</body>
</html>
